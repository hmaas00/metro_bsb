<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoramento de Sensores - Metrô DF</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: #121212;
            color: #e0e0e0;
        }
        #map {
            height: 350px;
            width: 70%;
            margin: 0 auto;
            flex-shrink: 0;
            border: 2px solid #333;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }
        #charts-wrapper {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            overflow-y: auto;
            padding: 40px;
            box-sizing: border-box;
            background-color: #1a1a1a;
        }
        #charts-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 40px;
            width: 100%;
        }
        .chart-box {
            width: calc(50% - 20px);
            height: 350px;
            background-color: #242424;
            border-radius: 8px;
            padding: 20px;
            box-sizing: border-box;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            margin: 20px 0;
            flex-shrink: 0;
            font-weight: 600;
            letter-spacing: 1px;
            color: #ffffff;
        }
        #file-upload-container {
            margin-bottom: 15px;
            color: #aaaaaa;
        }
        #station-title {
            text-align: center;
            width: 100%;
            margin-bottom: 40px;
            font-size: 2em;
            color: #4db8ff;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
    </style>
</head>
<body>
    <h1>Monitoramento de Sensores</h1>
    <div id="file-upload-container" style="text-align: center; margin-bottom: 10px;">
        <label for="csv-file"><b>Selecione o arquivo CSV local para ver os dados (se o mapa estiver vazio): </b></label>
        <input type="file" id="csv-file" accept=".csv">
    </div>
    <div id="map"></div>
    <div id="charts-wrapper">
        <h2 id="station-title">Selecione uma estação no mapa</h2>
        <div id="charts-container"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

    <script>
        const map = L.map('map').setView([-15.7942, -47.8822], 10);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let globalData = [];
        let chartInstances = {};

        const quantVars = ['vibracao', 'temperatura', 'velocidade_corrente', 'torque', 'contagem_pessoas'];
        const qualVars = ['impacto', 'abertura_porta', 'posicao', 'desalinhamento', 'travamento', 'posicao_suspeita'];

        // Tenta carregar automaticamente (funciona em servidor web)
        Papa.parse('dados_sensores_anomalias.csv', {
            download: true,
            header: true,
            dynamicTyping: true,
            skipEmptyLines: true,
            complete: function(results) {
                if (results.data && results.data.length > 0) {
                    globalData = results.data;
                    processMapPoints();
                }
            },
            error: function(err) {
                console.log("Falha ao carregar o CSV automaticamente. Por favor, use o botão de seleção de arquivo.");
            }
        });

        // Event listener para carregar o arquivo manualmente (funciona localmente com duplo clique)
        document.getElementById('csv-file').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                Papa.parse(file, {
                    header: true,
                    dynamicTyping: true,
                    skipEmptyLines: true,
                    complete: function(results) {
                        globalData = results.data;
                        processMapPoints();
                    }
                });
            }
        });

        let mapMarkers = [];

        function processMapPoints() {
            // Limpa os marcadores existentes
            mapMarkers.forEach(marker => map.removeLayer(marker));
            mapMarkers = [];
            const stations = {};

            globalData.forEach(row => {
                if (!row.estacao || !row.geolocalizacao) return;

                if (!stations[row.estacao]) {
                    let coords = row.geolocalizacao.split(',');
                    if (coords.length === 2) {
                        stations[row.estacao] = {
                            lat: parseFloat(coords[0]),
                            lng: parseFloat(coords[1])
                        };
                    }
                }
            });

            for (const [estacao, coords] of Object.entries(stations)) {
                if (!isNaN(coords.lat) && !isNaN(coords.lng)) {
                    const marker = L.marker([coords.lat, coords.lng]).addTo(map)
                        .bindPopup(`<b>${estacao}</b><br>Clique para ver os dados`)
                        .on('click', () => {
                            updateCharts(estacao);
                        });
                    mapMarkers.push(marker);
                }
            }
        }

        function updateCharts(estacao) {
            document.getElementById('station-title').innerText = `Estação: ${estacao}`;

            const stationData = globalData.filter(row => row.estacao === estacao);
            stationData.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));

            const labels = stationData.map(row => row.timestamp);

            quantVars.forEach(v => {
                createOrUpdateLineChart(v, labels, stationData.map(row => row[v]), `Variável: ${v}`);
            });

            qualVars.forEach(v => {
                const counts = {};
                stationData.forEach(row => {
                    let val = row[v];
                    if (val === null || val === undefined) val = 'N/A';
                    counts[val] = (counts[val] || 0) + 1;
                });
                const catLabels = Object.keys(counts);
                const catData = Object.values(counts);
                createOrUpdateBarChart(v, catLabels, catData, `Variável: ${v}`);
            });
        }

        function createChartContainer(id) {
            if (!document.getElementById(`container-${id}`)) {
                const div = document.createElement('div');
                div.className = 'chart-box';
                div.id = `container-${id}`;

                const canvas = document.createElement('canvas');
                canvas.id = `chart-${id}`;
                div.appendChild(canvas);

                document.getElementById('charts-container').appendChild(div);
            }
            return document.getElementById(`chart-${id}`);
        }

        Chart.defaults.color = '#e0e0e0';
        Chart.defaults.font.family = "'Segoe UI', Roboto, Helvetica, Arial, sans-serif";

        const gridConfig = {
            color: 'rgba(255, 255, 255, 0.1)',
            borderColor: 'rgba(255, 255, 255, 0.2)'
        };

        function createOrUpdateLineChart(id, labels, data, title) {
            const canvas = createChartContainer(id);
            if (chartInstances[id]) {
                chartInstances[id].data.labels = labels;
                chartInstances[id].data.datasets[0].data = data;
                chartInstances[id].update();
            } else {
                chartInstances[id] = new Chart(canvas, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: title,
                            data: data,
                            borderColor: 'rgba(77, 184, 255, 1)',
                            backgroundColor: 'rgba(77, 184, 255, 0.1)',
                            borderWidth: 2,
                            pointBackgroundColor: 'rgba(77, 184, 255, 1)',
                            fill: true,
                            tension: 0.2
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            title: {
                                display: true,
                                text: title,
                                font: { size: 16, weight: '600' }
                            },
                            legend: { display: false }
                        },
                        scales: {
                            x: { grid: gridConfig },
                            y: { grid: gridConfig }
                        }
                    }
                });
            }
        }

        function createOrUpdateBarChart(id, labels, data, title) {
            const canvas = createChartContainer(id);
            if (chartInstances[id]) {
                chartInstances[id].data.labels = labels;
                chartInstances[id].data.datasets[0].data = data;
                chartInstances[id].update();
            } else {
                chartInstances[id] = new Chart(canvas, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: title,
                            data: data,
                            backgroundColor: 'rgba(187, 134, 252, 0.7)',
                            borderColor: 'rgba(187, 134, 252, 1)',
                            borderWidth: 1,
                            borderRadius: 4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            title: {
                                display: true,
                                text: title,
                                font: { size: 16, weight: '600' }
                            },
                            legend: { display: false }
                        },
                        scales: {
                            x: { grid: gridConfig },
                            y: {
                                beginAtZero: true,
                                grid: gridConfig,
                                ticks: {
                                    stepSize: 1
                                }
                            }
                        }
                    }
                });
            }
        }
    </script>
</body>
</html>
