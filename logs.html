<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logs de Anomalias - Metrô DF</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #121212;
            color: #e0e0e0;
        }
        h1 {
            text-align: center;
            margin: 20px 0;
            font-weight: 600;
            letter-spacing: 1px;
            color: #ffffff;
        }
        .back-link { display: block; text-align: center; margin-bottom: 20px; }

        #file-upload-container {
            margin-bottom: 15px;
            color: #aaaaaa;
        }

        #config-container {
            background-color: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            margin: 0 auto 30px auto;
            max-width: 800px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            color: #e0e0e0;
        }

        .config-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .config-item label {
            margin-bottom: 5px;
            font-weight: bold;
            color: #4db8ff;
        }

        .config-item select, .config-item input[type="range"] {
            background-color: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 5px;
            border-radius: 4px;
        }

        #logs-container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }

        .log-card {
            background-color: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            width: 300px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            color: #e0e0e0;
        }

        .log-card h3 {
            margin-top: 0;
            color: #ff6b6b;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
            font-size: 1.1em;
        }

        .log-field {
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        .log-field strong {
            color: #4db8ff;
        }

        .trigger-reason {
            margin-top: 10px;
            font-size: 0.85em;
            color: #ccc;
            background: #2a2a2a;
            padding: 5px;
            border-radius: 4px;
            border: 1px solid #444;
        }
    </style>
</head>
<body>
    <h1>Logs de Anomalias Detectadas</h1>
    <div class="back-link">
        <a href="index.html" style="text-decoration: none; padding: 8px 12px; background-color: #333; color: white; border-radius: 5px; border: 1px solid #555;">Voltar ao Mapa</a>
    </div>

    <div id="file-upload-container" style="text-align: center; margin-bottom: 20px;">
        <label for="csv-file"><b>Selecione o arquivo CSV local para carregar os logs (se necessário): </b></label>
        <input type="file" id="csv-file" accept=".csv">
    </div>

    <div id="config-container">
        <div class="config-item">
            <label for="conf-estacao">Estação</label>
            <select id="conf-estacao">
                <option value="todas" selected>Todas</option>
            </select>
        </div>
        <div class="config-item">
            <label for="conf-travamento">Travamento</label>
            <select id="conf-travamento">
                <option value="sim" selected>Sim</option>
                <option value="não">Não</option>
                <option value="todos">Todos</option>
            </select>
        </div>
        <div class="config-item">
            <label for="conf-desalinhamento">Desalinhamento</label>
            <select id="conf-desalinhamento">
                <option value="severo_ou_critico" selected>Severo ou Crítico</option>
                <option value="severo">Severo</option>
                <option value="crítico">Crítico</option>
                <option value="leve">Leve</option>
                <option value="todos">Todos</option>
            </select>
        </div>
        <div class="config-item">
            <label for="conf-posicao">Posição Suspeita</label>
            <select id="conf-posicao">
                <option value="sim" selected>Sim</option>
                <option value="não">Não</option>
                <option value="todos">Todos</option>
            </select>
        </div>
        <div class="config-item">
            <label for="conf-porta">Abertura de Porta</label>
            <select id="conf-porta">
                <option value="forcada" selected>Forçada</option>
                <option value="normal">Normal</option>
                <option value="todos">Todos</option>
            </select>
        </div>
        <div class="config-item">
            <label for="conf-vibracao">Vibração ></label>
            <input type="range" id="conf-vibracao" min="0" max="30" step="1" value="10" oninput="document.getElementById('vib-val').innerText = this.value">
            <span id="vib-val" style="margin-top: 5px;">10</span>
        </div>
    </div>

    <div id="count-container" style="text-align: center; margin-bottom: 20px; color: #4db8ff; font-weight: bold; width: 100%;"></div>

    <div id="logs-container">
        <!-- Cards will be populated here by JavaScript -->
        <p style="text-align: center; width: 100%;">Carregando logs ou aguardando arquivo...</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

    <script>
        let globalData = [];

        function populateStations(data) {
            const select = document.getElementById('conf-estacao');
            // Keep the 'Todas' option, clear the rest
            select.innerHTML = '<option value="todas" selected>Todas</option>';

            const estacoes = new Set();
            data.forEach(row => {
                if (row.estacao && String(row.estacao).trim() !== '') {
                    estacoes.add(String(row.estacao).trim());
                }
            });

            const sortedEstacoes = Array.from(estacoes).sort();
            sortedEstacoes.forEach(estacao => {
                const option = document.createElement('option');
                option.value = estacao;
                option.textContent = estacao;
                select.appendChild(option);
            });
        }

        // Attach event listeners to all config inputs to re-process logs when changed
        document.getElementById('conf-estacao').addEventListener('change', processLogs);
        document.getElementById('conf-travamento').addEventListener('change', processLogs);
        document.getElementById('conf-desalinhamento').addEventListener('change', processLogs);
        document.getElementById('conf-posicao').addEventListener('change', processLogs);
        document.getElementById('conf-porta').addEventListener('change', processLogs);
        document.getElementById('conf-vibracao').addEventListener('input', processLogs);

        // Load CSV via web server
        Papa.parse('dados_sensores_anomalias.csv', {
            download: true,
            header: true,
            dynamicTyping: true,
            skipEmptyLines: true,
            complete: function(results) {
                if (results.data && results.data.length > 0) {
                    globalData = results.data;
                    globalData.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                    populateStations(globalData);
                    processLogs();
                } else {
                    document.getElementById('logs-container').innerHTML = '<p style="text-align: center; width: 100%;">Nenhum dado encontrado ou arquivo não carregou automaticamente. Use o botão acima.</p>';
                }
            },
            error: function(err) {
                console.log("Falha ao carregar o CSV automaticamente. Por favor, use o botão de seleção de arquivo.");
                document.getElementById('logs-container').innerHTML = '<p style="text-align: center; width: 100%;">Falha ao carregar automaticamente. Use o botão acima para carregar o arquivo CSV.</p>';
            }
        });

        // Load CSV via file input
        document.getElementById('csv-file').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                document.getElementById('logs-container').innerHTML = '<p style="text-align: center; width: 100%;">Processando arquivo...</p>';
                Papa.parse(file, {
                    header: true,
                    dynamicTyping: true,
                    skipEmptyLines: true,
                    complete: function(results) {
                        globalData = results.data;
                        globalData.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                        populateStations(globalData);
                        processLogs();
                    }
                });
            }
        });

        function getAnomalies(row) {
            let anomalies = [];

            const confTravamento = document.getElementById('conf-travamento').value;
            const confDesalinhamento = document.getElementById('conf-desalinhamento').value;
            const confPosicao = document.getElementById('conf-posicao').value;
            const confPorta = document.getElementById('conf-porta').value;
            const confVibracao = parseFloat(document.getElementById('conf-vibracao').value);

            // Travamento
            if (confTravamento !== 'todos' && row.travamento) {
                let travamento = String(row.travamento).trim().toLowerCase();
                let confT = confTravamento === 'sim' ? 'sim' : 'não';
                if (travamento === confT || travamento === confT.replace('ã', 'a')) {
                    anomalies.push(`Travamento: ${row.travamento}`);
                }
            } else if (confTravamento === 'todos' && row.travamento) {
                anomalies.push(`Travamento: ${row.travamento}`);
            }

            // Desalinhamento
            if (confDesalinhamento !== 'todos' && row.desalinhamento) {
                let des = String(row.desalinhamento).trim().toLowerCase();
                if (confDesalinhamento === 'severo_ou_critico') {
                    if (des === 'severo' || des === 'crítico' || des === 'critico') {
                        anomalies.push(`Desalinhamento: ${row.desalinhamento}`);
                    }
                } else if (des === confDesalinhamento || des === confDesalinhamento.replace('í', 'i')) {
                    anomalies.push(`Desalinhamento: ${row.desalinhamento}`);
                }
            } else if (confDesalinhamento === 'todos' && row.desalinhamento) {
                anomalies.push(`Desalinhamento: ${row.desalinhamento}`);
            }

            // Posicao
            if (confPosicao !== 'todos' && row.posicao_suspeita) {
                let pos = String(row.posicao_suspeita).trim().toLowerCase();
                let confP = confPosicao === 'sim' ? 'sim' : 'não';
                if (pos === confP || pos === confP.replace('ã', 'a')) {
                    anomalies.push(`Posição Suspeita: ${row.posicao_suspeita}`);
                }
            } else if (confPosicao === 'todos' && row.posicao_suspeita) {
                anomalies.push(`Posição Suspeita: ${row.posicao_suspeita}`);
            }

            // Porta
            if (confPorta !== 'todos' && row.abertura_porta) {
                let porta = String(row.abertura_porta).trim().toLowerCase();
                if (confPorta === 'forcada' && (porta === 'forçada' || porta === 'forcada')) {
                    anomalies.push(`Abertura da Porta: ${row.abertura_porta}`);
                } else if (confPorta === 'normal' && porta === 'normal') {
                    anomalies.push(`Abertura da Porta: ${row.abertura_porta}`);
                }
            } else if (confPorta === 'todos' && row.abertura_porta) {
                anomalies.push(`Abertura da Porta: ${row.abertura_porta}`);
            }

            // Vibracao
            if (row.vibracao !== null && row.vibracao !== undefined) {
                let vib = parseFloat(row.vibracao);
                if (!isNaN(vib) && vib > confVibracao) {
                    anomalies.push(`Vibração Elevada: ${row.vibracao}`);
                }
            }

            return anomalies;
        }

        function processLogs() {
            const container = document.getElementById('logs-container');
            container.innerHTML = ''; // Clear container

            const confEstacao = document.getElementById('conf-estacao').value;

            let anomalyCount = 0;

            globalData.forEach(row => {
                if (confEstacao !== 'todas' && row.estacao !== confEstacao) {
                    return;
                }

                const anomalies = getAnomalies(row);

                if (anomalies.length > 0) {
                    anomalyCount++;

                    const card = document.createElement('div');
                    card.className = 'log-card';

                    let htmlContent = `<h3>Alerta de Anomalia</h3>
                        <div class="log-field"><strong>Data/Hora:</strong> ${row.timestamp || 'N/A'}</div>
                        <div class="log-field"><strong>Estação:</strong> ${row.estacao || 'N/A'}</div>
                        <div class="log-field"><strong>Equipamento ID:</strong> ${row.equipamento_id || 'N/A'}</div>
                        <div class="log-field"><strong>Tipo Equipamento:</strong> ${row.tipo_equipamento || 'N/A'}</div>
                        <div class="trigger-reason"><strong>Motivo(s):</strong><br>
                            <ul style="margin: 5px 0; padding-left: 20px;">
                    `;

                    anomalies.forEach(anomaly => {
                        htmlContent += `<li>${anomaly}</li>`;
                    });

                    htmlContent += `</ul></div>`;

                    card.innerHTML = htmlContent;
                    container.appendChild(card);
                }
            });

            if (anomalyCount === 0) {
                container.innerHTML = '<p style="text-align: center; width: 100%;">Nenhuma anomalia encontrada com os critérios especificados.</p>';
            }

            document.getElementById('count-container').innerText = 'Total de anomalias listadas: ' + anomalyCount;
        }
    </script>
</body>
</html>
